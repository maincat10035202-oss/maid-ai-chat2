<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIチャット</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #e5ddd5; }
    header { background: #06c755; color: white; padding: 14px; text-align: center; font-weight: bold; }

    .character-area {
      text-align: center;
      background: #f7f7f7;
      padding: 10px;
    }

    #emotionImage { width: 160px; }
    #emotion { font-size: 14px; color: #555; }

    #chat {
      padding: 15px;
      padding-bottom: 90px;
      height: calc(100vh - 260px);
      overflow-y: auto;
      box-sizing: border-box;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      margin: 8px 0;
      border-radius: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .user { background: #9fe870; margin-left: auto; }
    .ai { background: white; margin-right: auto; }

    .input-area {
      display: flex;
      padding: 10px;
      background: white;
      position: fixed;
      bottom: 0;
      width: 100%;
      box-sizing: border-box;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 16px;
    }

    button {
      margin-left: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 20px;
      background: #06c755;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>AIチャット</header>

<div class="character-area">
  <img id="emotionImage" src="/images/normal.png">
  <div id="emotion">表情: normal</div>
</div>

<div id="chat"></div>

<div class="input-area">
  <input id="messageInput" placeholder="メッセージを入力">
  <button onclick="sendMessage()">送信</button>
</div>

<script>
window.onload = function() {
  const savedChat = localStorage.getItem("maidChatHistory");
  if (savedChat) {
    document.getElementById("chat").innerHTML = savedChat;
  }
};

async function sendMessage() {
  const input = document.getElementById("messageInput");
  const chat = document.getElementById("chat");
  const message = input.value.trim();

  if (!message) return;

  if (message.includes("私の名前は") || message.includes("僕の名前は")) {
    let name = message
      .replace("私の名前は", "")
      .replace("僕の名前は", "")
      .trim();

    localStorage.setItem("userName", name);
  }

  const userDiv = document.createElement("div");
  userDiv.className = "message user";
  userDiv.textContent = message;
  chat.appendChild(userDiv);

  input.value = "";

  const loading = document.createElement("div");
  loading.className = "message ai";
  loading.textContent = "考え中...";
  chat.appendChild(loading);

  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        message: message,
        userName: localStorage.getItem("userName")
      })
    });

    const data = await res.json();

    let reply = data.reply.trim();
    let emotion = "normal";

    const match = reply.match(/\[(normal|happy|shy|sad|angry|thinking)\]/);

    if (match) {
      emotion = match[1];
      reply = reply.replace(match[0], "").trim();
    }

    if (emotion === "thinking") {
      emotion = "normal";
    }

    document.getElementById("emotion").textContent = "表情: " + emotion;
    document.getElementById("emotionImage").src = "/images/" + emotion + ".png";

    loading.textContent = reply;
    localStorage.setItem("maidChatHistory", chat.innerHTML);

  } catch (error) {
    loading.textContent = "エラー: " + error;
  }

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
